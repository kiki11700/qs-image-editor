[build]
  builder = "nixpacks"
  buildCommand = "npm install && npm run build"
  watchPatterns = ["src/**", "server.js", "package.json"]

[deploy]
  startCommand = "node server.js"
  healthcheckPath = "/health"
  healthcheckTimeout = 100

[volumes]
  "uploads" = "/app/uploads"
  "data" = "/app/data.db"
