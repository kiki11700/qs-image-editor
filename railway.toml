[build]
  builder = "nixpacks"
  buildCommand = "npm install && cd frontend && npm install && npm run build && cd .."
  watchPatterns = ["src/**", "server.js", "package.json", "frontend/**"]

[deploy]
  startCommand = "node server.js"
  healthcheckPath = "/health"
  healthcheckTimeout = 100

[volumes]
  "uploads" = "/app/uploads"
  "data" = "/app/data"
